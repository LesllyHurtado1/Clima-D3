<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard Climático</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>Clima</h1>

<div class="chart">
    <h2>Temperatura vs Tiempo</h2>
    <svg id="chart1" width="900" height="400"></svg>
</div>

<div class="chart">
    <h2>CO2 por país</h2>
    <svg id="chart2" width="900" height="400"></svg>
</div>

<div class="chart">
    <h2>Consumo vs Precio</h2>
    <svg id="chart3" width="900" height="400"></svg>
</div>

<div class="chart">
    <h2>Energía renovable por país</h2>
    <svg id="chart4" width="900" height="400"></svg>
</div>


<div class="chart">
    <h2>Renovable vs CO2</h2>
    <svg id="chart6" width="900" height="400"></svg>
</div>

<script src="script.js"></script>

</body>
</html>
